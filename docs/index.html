<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sruti &amp; Vijay — Wedding Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }

    body {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background-color:#3A0813;
      background-image: radial-gradient(#5A0C1D 1px, transparent 1px), radial-gradient(#5A0C1D 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: 0 0, 20px 20px;
      font-family:'Cormorant Garamond',serif;
    }

    /* ── Petals ── */
    .petals { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .petal  { position:absolute; bottom:-30px; opacity:0; animation:rise linear infinite; }
    @keyframes rise {
      0%   { transform:translateY(0) rotate(0deg); opacity:0; }
      6%   { opacity:.5; }
      90%  { opacity:.35; }
      100% { transform:translateY(-110vh) rotate(600deg); opacity:0; }
    }

    .stage {
      position:relative; z-index:10;
      display:flex; flex-direction:column; align-items:center; gap:36px;
      opacity:1; transition:opacity .6s ease;
    }
    .eyebrow {
      font-family:'Cinzel',serif;
      font-size:clamp(9px,1.1vw,12px);
      letter-spacing:6px; color:#F3E5AB;
      text-transform:uppercase; opacity:.75;
    }

    /* ── Envelope wrapper ── */
    .envelope {
      position: relative;
      width: clamp(340px, 60vw, 700px);
      cursor: pointer;
      perspective: 1200px;
      perspective-origin: 50% 0%;
      filter: drop-shadow(0 40px 60px rgba(0,0,0,0.8));
    }

    .env-inner {
      position: relative;
      width: 100%;
      padding-top: 65%;
      border-radius: 4px;
      background: #5c0b18;
    }

    .env-body {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 4px;
      z-index: 1;
    }

    /* ── Flap ── */
    .env-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 52%;
      z-index: 3;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .env-flap-svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5));
    }

    .env-flap.open {
      transform: rotateX(-180deg);
    }

    /* ── Wax seal ── */
    .seal-wrap {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      transition: opacity 0.3s ease, transform 0.4s ease;
    }
    .seal-wrap:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }
    .seal-wrap.gone {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2);
      pointer-events: none;
    }
    .seal-svg {
      display: block;
      width: clamp(70px, 12vw, 110px);
      height: clamp(70px, 12vw, 110px);
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7));
    }

    /* ── Hint ── */
    .hint {
      font-family:'Cinzel',serif;
      font-size:clamp(10px,1.2vw,14px);
      letter-spacing:5px; color:#F3E5AB;
      text-transform:uppercase;
      animation:pulse 2s ease-in-out infinite;
      transition:opacity .4s ease;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    .hint.gone { opacity:0; pointer-events:none; }
    @keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:1} }

    /* ── Floating card ── */
    .card-el {
      position:fixed; z-index:30;
      display:none; border-radius:2px; overflow:hidden;
      box-shadow:0 32px 100px rgba(0,0,0,.75), 0 8px 28px rgba(0,0,0,.4);
    }
    .card-el img { position:absolute; top:50%; left:50%; }

    /* ── Backdrop ── */
    .backdrop {
      position:fixed; inset:0;
      background:rgba(45,0,10,.85);
      backdrop-filter:blur(14px);
      z-index:20; opacity:0; pointer-events:none;
      transition:opacity .75s ease;
    }
    .backdrop.show { opacity:1; pointer-events:all; }

    /* ── Close ── */
    .close-btn {
      position:fixed; top:22px; right:26px; z-index:40;
      font-family:'Cinzel',serif; font-size:10px; letter-spacing:3px;
      color:#F3E5AB; text-transform:uppercase;
      background:none; border:none; cursor:pointer;
      opacity:0; pointer-events:none; transition:opacity .5s ease;
    }
    .close-btn.show { opacity:.75; pointer-events:all; }
    .close-btn:hover { opacity:1; }
  </style>
</head>
<body>

<audio id="bgMusic" loop preload="none">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="petals" id="petals"></div>

<div class="stage" id="stage">
  <div class="eyebrow">A Wedding Invitation</div>

  <div class="envelope" id="envelope" onclick="handleClick()">
    <div class="env-inner">

      <!-- BODY SVG -->
      <svg class="env-body" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#BF953F"/>
            <stop offset="25%" stop-color="#FCF6BA"/>
            <stop offset="50%" stop-color="#B38728"/>
            <stop offset="75%" stop-color="#FBF5B7"/>
            <stop offset="100%" stop-color="#AA771C"/>
          </linearGradient>
          <pattern id="mandala-bg" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
            <path d="M40 0 C45 15 55 25 80 40 C55 55 45 65 40 80 C35 65 25 55 0 40 C25 25 35 15 40 0 Z" fill="#6a0d1c" opacity="0.4"/>
            <circle cx="40" cy="40" r="15" fill="none" stroke="#6a0d1c" stroke-width="1.5" opacity="0.4"/>
          </pattern>
          <filter id="panel-shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="-5" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
          </filter>
        </defs>

        <rect width="800" height="520" fill="#E8D4B2" rx="4"/>
        <rect x="10" y="10" width="780" height="500" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.7"/>

        <g filter="url(#panel-shadow)">
          <polygon points="0,0 0,520 800,520 800,0 400,320" fill="#4a0915"/>
          <polygon points="0,0 0,520 800,520 800,0 400,320" fill="url(#mandala-bg)"/>

          <line x1="0" y1="0" x2="400" y2="320" stroke="url(#gold-grad)" stroke-width="3" opacity="0.9"/>
          <line x1="800" y1="0" x2="400" y2="320" stroke="url(#gold-grad)" stroke-width="3" opacity="0.9"/>
          <line x1="0" y1="520" x2="400" y2="320" stroke="#2a040b" stroke-width="2" opacity="0.5"/>
          <line x1="800" y1="520" x2="400" y2="320" stroke="#2a040b" stroke-width="2" opacity="0.5"/>

          <rect x="8" y="8" width="784" height="504" fill="none" stroke="url(#gold-grad)" stroke-width="4" rx="2"/>
          <rect x="16" y="16" width="768" height="488" fill="none" stroke="url(#gold-grad)" stroke-width="1" rx="2" opacity="0.6"/>

          <g stroke="url(#gold-grad)" fill="none" stroke-width="2">
            <path d="M 25 25 L 25 80 Q 25 25 80 25" transform="translate(0,415)"/>
            <path d="M 35 35 L 35 60 Q 35 35 60 35" transform="translate(0,415)"/>
            <path d="M 775 25 L 775 80 Q 775 25 720 25" transform="translate(0,415) rotate(90,747.5,52.5)"/>
            <path d="M 765 35 L 765 60 Q 765 35 740 35" transform="translate(0,415) rotate(90,752.5,47.5)"/>
          </g>

          <g transform="translate(400,460)" fill="none" stroke="url(#gold-grad)" stroke-width="2">
            <path d="M 0,10 C -15,-10 -30,0 0,35 C 30,0 15,-10 0,10 Z" fill="url(#gold-grad)" opacity="0.2"/>
            <path d="M 0,10 C -15,-10 -30,0 0,35 C 30,0 15,-10 0,10 Z"/>
            <path d="M -10,15 C -35,-5 -45,15 0,35 C -10,25 -20,20 -10,15 Z"/>
            <path d="M 10,15 C 35,-5 45,15 0,35 C 10,25 20,20 10,15 Z"/>
            <circle cx="0" cy="42" r="3" fill="url(#gold-grad)"/>
          </g>

          <g stroke="url(#gold-grad)" fill="none" stroke-width="1.5" opacity="0.6">
            <path d="M 60,260 C 120,200 150,280 80,320 C 110,290 80,240 60,260 Z"/>
            <circle cx="95" cy="285" r="5" fill="url(#gold-grad)" opacity="0.4"/>
            <path d="M 740,260 C 680,200 650,280 720,320 C 690,290 720,240 740,260 Z"/>
            <circle cx="705" cy="285" r="5" fill="url(#gold-grad)" opacity="0.4"/>
          </g>
        </g>
      </svg>

      <!-- FLAP -->
      <div class="env-flap" id="flap">
        <svg class="env-flap-svg" viewBox="0 0 800 270" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="flap-gold" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#BF953F"/>
              <stop offset="25%" stop-color="#FCF6BA"/>
              <stop offset="50%" stop-color="#B38728"/>
              <stop offset="75%" stop-color="#FBF5B7"/>
              <stop offset="100%" stop-color="#AA771C"/>
            </linearGradient>
            <pattern id="flap-pattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
              <path d="M40 0 C45 15 55 25 80 40 C55 55 45 65 40 80 C35 65 25 55 0 40 C25 25 35 15 40 0 Z" fill="#751122" opacity="0.6"/>
            </pattern>
          </defs>
          <polygon points="0,0 800,0 400,270" fill="#5c0b18"/>
          <polygon points="0,0 800,0 400,270" fill="url(#flap-pattern)"/>
          <polyline points="4,0 400,266 796,0" fill="none" stroke="url(#flap-gold)" stroke-width="8"/>
          <polyline points="18,0 400,250 782,0" fill="none" stroke="url(#flap-gold)" stroke-width="2" opacity="0.8"/>
          <polyline points="26,0 400,240 774,0" fill="none" stroke="url(#flap-gold)" stroke-width="1" stroke-dasharray="6,4" opacity="0.7"/>
          <g transform="translate(400,80)" fill="url(#flap-gold)">
            <path d="M -15,-20 C -25,-30 -40,-10 -20,10 C -10,20 -20,35 -30,25 C -35,20 -30,10 -25,5 C -20,0 -10,-10 0,-15 C 20,-25 30,-5 20,15 C 10,35 -15,45 -25,60 C -15,55 5,45 25,25 C 40,10 25,-15 5,-20 C -5,-22 -10,-20 -15,-20 Z"/>
            <circle cx="15" cy="-25" r="4"/>
            <path d="M 8,-35 C 12,-45 18,-45 22,-35 C 18,-38 12,-38 8,-35 Z"/>
            <circle cx="-35" cy="0" r="2.5" opacity="0.7"/>
            <circle cx="35" cy="0" r="2.5" opacity="0.7"/>
          </g>
        </svg>
      </div>

      <!-- WAX SEAL -->
      <div class="seal-wrap" id="sealWrap">
        <svg class="seal-svg" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="seal-gold" x1="20%" y1="0%" x2="80%" y2="100%">
              <stop offset="0%" stop-color="#FFDF73"/>
              <stop offset="50%" stop-color="#D4AF37"/>
              <stop offset="100%" stop-color="#996515"/>
            </linearGradient>
            <radialGradient id="wax-bevel" cx="30%" cy="30%" r="70%">
              <stop offset="0%" stop-color="#B22222"/>
              <stop offset="70%" stop-color="#8B0000"/>
              <stop offset="100%" stop-color="#4A0000"/>
            </radialGradient>
          </defs>
          <path d="M60,2 C75,0 90,8 102,18 C115,28 120,45 118,60 C116,75 110,92 98,104 C85,116 65,122 50,118 C35,114 18,105 8,92 C-2,78 0,60 4,45 C8,30 18,15 32,8 C45,1 50,4 60,2 Z" fill="url(#wax-bevel)"/>
          <circle cx="60" cy="60" r="50" fill="#7a0000"/>
          <circle cx="60" cy="60" r="46" fill="none" stroke="url(#seal-gold)" stroke-width="5"/>
          <circle cx="60" cy="60" r="41" fill="none" stroke="url(#seal-gold)" stroke-width="1.5" opacity="0.6"/>
          <g transform="translate(60,62)" fill="url(#seal-gold)">
            <path d="M-10,-15 C-18,-15 -25,-8 -25,0 C-25,8 -18,15 -10,15 C-2,15 0,10 5,5 C10,15 18,22 25,22 C30,22 35,18 35,12 C35,6 30,2 25,2 C18,2 15,8 10,12 C5,5 2,-5 -5,-5 C-10,-5 -12,0 -12,5 C-12,10 -8,12 -5,12 C0,12 5,8 8,2 L5,-2 C2,-8 -2,-12 -10,-12 Z"/>
            <circle cx="15" cy="-18" r="3.5"/>
            <circle cx="0" cy="22" r="2"/>
          </g>
        </svg>
      </div>

    </div><!-- /.env-inner -->
  </div><!-- /.envelope -->

  <div class="hint" id="hint">✦ &nbsp; Tap to Open &nbsp; ✦</div>
</div>

<div class="backdrop" id="backdrop" onclick="dismissCard()"></div>

<div class="card-el" id="cardEl">
  <img id="cardImg" src="invite.png" alt="Sruti &amp; Vijay Wedding Invitation">
</div>

<button class="close-btn" id="closeBtn" onclick="dismissCard()">✕ &nbsp; Close</button>

<script>
/* ── Petals ── */
(function(){
  const c=document.getElementById('petals');
  const cols=['rgba(201,146,74,.3)','rgba(227,185,106,.27)','rgba(255,220,150,.2)','rgba(190,60,80,.2)'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div'); p.className='petal';
    const s=8+Math.random()*13;
    p.style.cssText=`width:${s}px;height:${s*1.7}px;left:${Math.random()*100}%;
      background:${cols[i%cols.length]};
      animation-duration:${10+Math.random()*14}s;
      animation-delay:${-Math.random()*22}s;
      border-radius:${Math.random()>.5?'50% 10% 50% 10%':'10% 50% 10% 50%'};`;
    c.appendChild(p);
  }
})();

let phase = 'closed';

function handleClick(){
  if(phase === 'closed')        startOpening();
  else if(phase === 'centered') dismissCard();
}

function startOpening(){
  phase = 'opening';
  document.getElementById('hint').classList.add('gone');
  document.getElementById('envelope').style.cursor = 'default';

  // 1. Seal fades out
  document.getElementById('sealWrap').classList.add('gone');

  // 2. Play music
  const music = document.getElementById('bgMusic');
  music.currentTime = 0;
  music.volume = 0;
  const playPromise = music.play();
  if(playPromise !== undefined){
    playPromise.then(() => {
      let vol = 0;
      const fadeIn = setInterval(() => {
        vol = Math.min(vol + 0.04, 0.6);
        music.volume = vol;
        if(vol >= 0.6) clearInterval(fadeIn);
      }, 100);
    }).catch(err => console.warn('Audio play failed:', err));
  }

  // 3. Flap swings open
  setTimeout(() => document.getElementById('flap').classList.add('open'), 300);

  // 4. Card rises out
  setTimeout(() => emergeCard(), 1500);
}

function emergeCard(){
  const envEl   = document.getElementById('envelope');
  const inner   = envEl.querySelector('.env-inner');
  const cardEl  = document.getElementById('cardEl');
  const cardImg = document.getElementById('cardImg');
  const rect    = inner.getBoundingClientRect();

  const cardW = Math.round(rect.width  * 0.80);
  const cardH = Math.round(rect.height * 0.80);
  const startLeft = rect.left + (rect.width  - cardW) / 2;
  const startTop  = rect.top  + (rect.height - cardH) / 2;

  cardImg.style.cssText = `
    width:${cardW}px; height:${cardH}px;
    top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-90deg);
    object-fit:cover;
  `;
  cardEl.style.cssText = `
    display:block;
    width:${cardW}px; height:${cardH}px;
    top:${startTop}px; left:${startLeft}px;
    opacity:0; transform:translateY(0px);
    transition:none;
  `;
  void cardEl.offsetWidth;

  cardEl.style.transition = 'transform 1.1s cubic-bezier(.23,1,.32,1), opacity .4s ease';
  cardEl.style.transform  = `translateY(-${cardH}px)`;
  cardEl.style.opacity    = '1';

  setTimeout(() => {
    envEl.style.transition = 'opacity .5s ease';
    envEl.style.opacity    = '0';
    document.getElementById('stage').style.transition = 'opacity .5s ease';
    document.getElementById('stage').style.opacity    = '0';
  }, 350);

  setTimeout(() => glideToCenter(cardW, cardH), 1350);
}

function glideToCenter(cardW, cardH){
  const cardEl  = document.getElementById('cardEl');
  const cardImg = document.getElementById('cardImg');

  const cur = cardEl.getBoundingClientRect();
  cardEl.style.transition = 'none';
  cardEl.style.transform  = 'none';
  cardEl.style.top        = cur.top  + 'px';
  cardEl.style.left       = cur.left + 'px';
  void cardEl.offsetWidth;

  const maxSide = Math.min(window.innerWidth * .86, window.innerHeight * .86);
  const tTop    = (window.innerHeight - maxSide) / 2;
  const tLeft   = (window.innerWidth  - maxSide) / 2;

  cardImg.style.cssText = `
    width:${maxSide}px; height:${maxSide}px;
    top:50%; left:50%;
    transform:translate(-50%,-50%) rotate(-90deg);
    object-fit:cover;
  `;
  cardEl.style.transition = [
    'top .85s cubic-bezier(.25,.46,.45,.94)',
    'left .85s cubic-bezier(.25,.46,.45,.94)',
    'width .85s cubic-bezier(.25,.46,.45,.94)',
    'height .85s cubic-bezier(.25,.46,.45,.94)'
  ].join(',');
  cardEl.style.top    = tTop   + 'px';
  cardEl.style.left   = tLeft  + 'px';
  cardEl.style.width  = maxSide + 'px';
  cardEl.style.height = maxSide + 'px';

  document.getElementById('backdrop').classList.add('show');
  setTimeout(() => {
    phase = 'centered';
    document.getElementById('closeBtn').classList.add('show');
  }, 900);
}

function dismissCard(){
  const cardEl = document.getElementById('cardEl');
  const stage  = document.getElementById('stage');
  const envEl  = document.getElementById('envelope');

  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('closeBtn').classList.remove('show');
  cardEl.style.transition = 'opacity .4s ease';
  cardEl.style.opacity    = '0';
  stage.style.opacity     = '1';
  envEl.style.opacity     = '1';

  setTimeout(() => {
    cardEl.style.display = 'none';
    const flap = document.getElementById('flap');
    flap.style.transition = 'none';
    flap.classList.remove('open');
    void flap.offsetWidth;
    flap.style.transition = '';
    document.getElementById('sealWrap').classList.remove('gone');
    envEl.style.cursor = 'pointer';
    document.getElementById('hint').classList.remove('gone');
    phase = 'closed';
  }, 500);
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape' && phase === 'centered') dismissCard();
});
</script>
</body>
</html>
